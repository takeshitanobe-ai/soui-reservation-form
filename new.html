<!doctype html>
<html lang="ja" data-form="new">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sou-i 予約フォーム</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/themes/base/jquery-ui.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.20/jquery.datetimepicker.min.css">
  <style>
    body { background: #fff; color: #222; }
    .notice {
      margin: 0 auto 28px;
      padding: 28px 18px;
      max-width: 860px;
      text-align: center;
      font-size: clamp(20px, 4vw, 38px);
      font-weight: 700;
      line-height: 1.45;
      white-space: pre-line;
    }
    .date-notice {
      margin: 28px 0 12px;
      font-size: clamp(18px, 3.8vw, 32px);
      font-weight: 700;
      line-height: 1.45;
      white-space: pre-line;
    }
    .form-wrap { max-width: 860px; margin: 0 auto; padding: 24px 20px 56px; }
    label { margin-top: 16px; font-weight: 700; }
    .btn-submit { min-width: 120px; }
    .loading { padding: 32px; text-align: center; color: #555; }
  </style>
</head>
<body>
  <main class="form-wrap">
    <div id="loading" class="loading">フォームを読み込んでいます...</div>
    <section id="formArea" hidden>
      <div id="topNotice" class="notice"></div>
      <form id="reservationForm">
        <label for="name">お名前</label>
        <input class="form-control" id="name" name="name" required>

        <label for="phone">電話番号</label>
        <input class="form-control" id="phone" name="phone" inputmode="tel" required>

        <label for="menu">ご希望メニュー</label>
        <select class="form-control" id="menu" name="menu"></select>

        <label for="stylist">担当者</label>
        <select class="form-control" id="stylist" name="stylist"></select>

        <div id="dateNotice" class="date-notice"></div>

        <label for="schedule1">ご希望日時</label>
        <input class="form-control schedule" id="schedule1" name="schedule1" value="第１希望" readonly>

        <label for="schedule2">ご希望日時</label>
        <input class="form-control schedule" id="schedule2" name="schedule2" value="第２希望" readonly>

        <label for="schedule3">ご希望日時</label>
        <input class="form-control schedule" id="schedule3" name="schedule3" value="第３希望" readonly>

        <label for="remarks" id="remarksLabel">ご希望・ご相談はこちら</label>
        <p id="remarksHelp" class="mb-2"></p>
        <textarea class="form-control" id="remarks" name="remarks" rows="3"></textarea>

        <input type="submit" class="mt-4 btn btn-primary btn-submit" value="送信">
      </form>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.20/jquery.datetimepicker.full.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const DEFAULT_FORM_KEY = document.documentElement.dataset.form || "repeat";
    const FORM_KEY = params.get("form") || DEFAULT_FORM_KEY;
    const CONFIG_URL = params.get("config") || "form-config.json";
    const FALLBACK_CONFIG = {
      forms: {
        repeat: {
          title: "Sou-i 予約フォーム",
          liff_id: "2000263820-Q6Kg85g1",
          top_notice: "土日のご予約が大変混み合っております。\n比較的余裕を持ったお問合せをよろしくお願い致します。",
          date_notice: "混雑具合によっては、ご希望日時にお取り出来ない場合がございます。\n日程をズラす等、できる限り第３希望までのご入力をお願い致します。",
          remarks_label: "ご希望・ご相談はこちら",
          remarks_help: "上記のご希望日時以外にもご来店可能な日時があればご記入下さい",
          thanks_message: "ご入力ありがとうございます。\n日時が確定しましたら、\n担当よりご連絡をさせて頂きます。\n今しばらくお待ちくださいませ。\n\nSou-i hair face＆eye",
          menus: ["カット", "カット＋カラー", "カット+カラー+トリートメント", "カット＋トリートメント", "カット＋ヘッドスパ", "カット＋カラー＋ヘッドスパ", "カット＋パーマ", "カット&ストレート", "カット+パーマ+トリートメント", "カット＋パーマ＋ヘッドスパ", "ヘッドスパ", "髪質改善トリートメント", "ドライヘッドスパ", "マツエク", "マツパー", "フェイシャル"],
          stylists: ["指名なし", "飯沼 美里", "川田 綾子", "菅原 都美", "田野辺 武　(ご新規対応✕)", "石井 瑞希", "滑澤 由衣", "佐藤 真由美", "平本 莉久", "武田 葵"]
        },
        new: {
          title: "‘24/4からご来店のお客様",
          liff_id: "2004257001-6krL1X3o",
          top_notice: "営業時間 9：30〜17：30（18：30クローズ）\nカラー＆パーマ【最終受付16：30】\n『連休：第3 日曜日・月曜日』\n\nカット＋頭皮ケアスパコース\n男性　￥8,800/90分\n女性　￥9,500/120分\n\n＊カットだけをご希望の一般のお客様は全てこちらのカットコースのみとさせて頂きます。\n\n※ご新規ご予約時のお子様について\n子供カットの受付は今現在スタッフ不足のため受付を一時的に停止させていただきます。\n＊高校以上は可\n＊Sou-iロイヤル様ファミリーは可",
          date_notice: "できる限り第３希望までのご入力をお願い致します。",
          remarks_label: "ご希望・ご相談はこちら",
          remarks_help: "上記のご希望日時以外にもご来店可能な日時があればご記入下さい。",
          thanks_message: "ご入力ありがとうございます。\n日時が確定しましたら、\n担当よりご連絡をさせて頂きます。\n今しばらくお待ちくださいませ。\n\nSou-i hair face＆eye",
          menus: ["カット＋頭皮ケアスパコース", "カット＋カラー", "カット＋カラー＋トリートメント", "髪質改善トリートメント", "ヘッドスパ"],
          stylists: ["指名なし", "飯沼 美里", "川田 綾子", "菅原 都美"]
        }
      }
    };

    function asList(value) {
      return Array.isArray(value) ? value : [];
    }

    function setOptions(select, values) {
      select.innerHTML = "";
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    async function loadConfig() {
      try {
        const response = await fetch(CONFIG_URL, { cache: "no-store" });
        if (!response.ok) throw new Error("設定ファイルを読み込めませんでした");
        return response.json();
      } catch (error) {
        console.warn("設定ファイルの読み込みに失敗したため、予備設定で表示します。", error);
        return FALLBACK_CONFIG;
      }
    }

    async function initLiff(liffId) {
      if (!liffId || !window.liff) return false;
      try {
        await liff.init({ liffId });
        return true;
      } catch (error) {
        console.warn("LIFF init failed", error);
        return false;
      }
    }

    function sendText(text, liffReady) {
      if (!liffReady) {
        alert("LINE内で開くと送信できます。\n\n確認用メッセージ:\n" + text);
        return;
      }
      liff.sendMessages([{ type: "text", text }])
        .then(() => liff.closeWindow())
        .catch((error) => alert("送信できませんでした: " + error));
    }

    function buildMessage(form, cfg) {
      const name = form.name.value;
      const phone = form.phone.value;
      const menu = form.menu.value;
      const stylist = form.stylist.value;
      const schedule1 = form.schedule1.value;
      const schedule2 = form.schedule2.value;
      const schedule3 = form.schedule3.value;
      const remarks = form.remarks.value;
      return `${name} 様\n${phone}\n${menu}\n${stylist}\n${schedule1}\n${schedule2}\n${schedule3}\n${remarks}\n\n${cfg.thanks_message || ""}`;
    }

    async function main() {
      const config = await loadConfig();
      const cfg = config.forms && config.forms[FORM_KEY] ? config.forms[FORM_KEY] : config.forms.repeat;
      document.title = cfg.title || "Sou-i 予約フォーム";
      document.getElementById("topNotice").textContent = cfg.top_notice || "";
      document.getElementById("dateNotice").textContent = cfg.date_notice || "";
      document.getElementById("remarksLabel").textContent = cfg.remarks_label || "ご希望・ご相談はこちら";
      document.getElementById("remarksHelp").textContent = cfg.remarks_help || "";
      setOptions(document.getElementById("menu"), asList(cfg.menus));
      setOptions(document.getElementById("stylist"), asList(cfg.stylists));
      $(".schedule").datetimepicker({ lang: "ja" });
      const liffReady = await initLiff(cfg.liff_id);
      document.getElementById("reservationForm").addEventListener("submit", (event) => {
        event.preventDefault();
        sendText(buildMessage(event.currentTarget, cfg), liffReady);
      });
      document.getElementById("loading").hidden = true;
      document.getElementById("formArea").hidden = false;
    }

    main().catch((error) => {
      document.getElementById("loading").textContent = "フォーム設定の読み込みに失敗しました: " + error.message;
    });
  </script>
</body>
</html>
